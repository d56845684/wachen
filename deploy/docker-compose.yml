services:
  postgres:
    restart: unless-stopped
    image: postgres:16-alpine
    container_name: wachen-postgres
    environment:
      POSTGRES_USER: wachen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wachen_dev}
      POSTGRES_DB: wachen
    # 不對外暴露 port：服務間走內部網路；本機檢視用 make psql / Adminer
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wachen -d wachen"]
      interval: 3s
      timeout: 3s
      retries: 20

  migrate:
    image: migrate/migrate:v4.17.1
    container_name: wachen-migrate
    volumes:
      - ../migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://wachen:${POSTGRES_PASSWORD:-wachen_dev}@postgres:5432/wachen?sslmode=disable"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy

  nats:
    restart: unless-stopped
    image: nats:2.10-alpine
    container_name: wachen-nats
    command: ["--jetstream", "--store_dir", "/data", "--http_port", "8222"]
    # 4222/8222 僅內部使用；監控用 make nats-check（容器內 wget）
    volumes:
      - natsdata:/data

  mockgoogle:
    restart: unless-stopped
    build: ../crawler
    image: wachen-crawler
    container_name: wachen-mockgoogle
    command: ["/bin/mockgoogle"]
    environment:
      PORT: "8081"
      MOCK_INTERVAL: "20s"
      MOCK_SEED_COUNT: "8"
    # 僅供 worker 內部抓取，不對外

  scheduler:
    restart: unless-stopped
    image: wachen-crawler
    container_name: wachen-scheduler
    command: ["/bin/scheduler"]
    environment:
      DATABASE_URL: postgres://app_user:app_dev_password@postgres:5432/wachen?sslmode=disable
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      mockgoogle:
        condition: service_started
      nats:
        condition: service_started

  worker:
    restart: unless-stopped
    image: wachen-crawler
    command: ["/bin/worker"]
    environment:
      DATABASE_URL: postgres://app_user:app_dev_password@postgres:5432/wachen?sslmode=disable
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    deploy:
      replicas: 2   # 分散式驗證：兩個 worker 分食任務；可用 --scale worker=N 再加

  ingestion:
    restart: unless-stopped
    image: wachen-crawler
    container_name: wachen-ingestion
    command: ["/bin/ingestion"]
    environment:
      DATABASE_URL: postgres://app_user:app_dev_password@postgres:5432/wachen?sslmode=disable
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  webhook:
    restart: unless-stopped
    image: wachen-crawler
    container_name: wachen-webhook
    command: ["/bin/webhook"]
    environment:
      DATABASE_URL: postgres://app_user:app_dev_password@postgres:5432/wachen?sslmode=disable
      NATS_URL: nats://nats:4222
      PORT: "8090"
    # PoC 不對外；正式環境 webhook 是唯一需要 ingress 的服務（接外部推送）
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  routing:
    restart: unless-stopped
    image: wachen-crawler
    container_name: wachen-routing
    command: ["/bin/routing"]
    environment:
      DATABASE_URL: postgres://app_user:app_dev_password@postgres:5432/wachen?sslmode=disable
      NATS_URL: nats://nats:4222
      NOTIFY_MODE: log   # PoC 模擬送出；M-real 換 smtp / line
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  analyzer:
    restart: unless-stopped
    build: ../analyzer
    image: wachen-analyzer
    container_name: wachen-analyzer
    environment:
      DATABASE_URL: postgres://app_user:app_dev_password@postgres:5432/wachen
      NATS_URL: nats://nats:4222
      # LLM 供應商：GEMINI_API_KEY 有值 → Gemini；未設定 → heuristic fallback
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  replier:
    restart: unless-stopped
    image: wachen-crawler
    container_name: wachen-replier
    command: ["/bin/replier"]
    environment:
      DATABASE_URL: postgres://app_user:app_dev_password@postgres:5432/wachen?sslmode=disable
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  api:
    restart: unless-stopped
    image: wachen-crawler
    container_name: wachen-api
    command: ["/bin/api"]
    environment:
      DATABASE_URL: postgres://app_user:app_dev_password@postgres:5432/wachen?sslmode=disable
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      PORT: "8070"
    # 不對外：唯一入口是 web(nginx) 的 /api/ 反向代理
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  web:
    restart: unless-stopped
    build: ../admin
    image: wachen-admin
    container_name: wachen-web
    ports:
      - "8088:80"   # 後台唯一對外入口（nginx：靜態 SPA + /api 代理）
    depends_on:
      api:
        condition: service_started

  adminer:
    restart: unless-stopped
    image: adminer:4
    container_name: wachen-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  natsdata:
